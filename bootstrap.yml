---

- hosts: bootstrap
  become: true
  vars:
    ansible_user: chris

  pre_tasks:
 
  - name: install updates (Ubuntu)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_facts['distribution'] == "Ubuntu" or ansible_facts['distribution'] == "Debian"

  - name: install updates (Debian)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_facts['distribution'] == "Ubuntu" or ansible_facts['distribution'] == "Debian"

  roles:
    - bootstrap
